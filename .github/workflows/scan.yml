name: Hourly Movie Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # Required to allow the Action to push commits back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added cryptography for your decoding logic
          pip install aiohttp cryptography

      - name: Run Scraper Script
        # Securely pass the secret key to the environment
        env:
          SUPER_KEY: ${{ secrets.SUPER_KEY }}
        run: |
          # Replace 'scraper.py' with your actual encoded/bootstrap python filename
          python scraper.py 

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Stage the data folder where your JSON is saved
          git add data/
          
          # Check if there are any changes to commit to avoid workflow errors
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update movie stats 🤖"
            git push
          fi
